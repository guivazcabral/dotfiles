# tmux.conf
# Symlink: ln -s ~/dev/dotfiles/tmux/tmux.conf ~/.config/tmux/tmux.conf

# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'

# =============================================================================
# Core settings
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -sg escape-time 0        # No delay for Alt key sequences (important for nvim)
set -g focus-events on

# Index from 1 so Alt+1 maps to first window
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g mouse off
set -g detach-on-destroy on

set-window-option -g mode-keys vi

# Auto-rename windows to current directory name
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format '#{b:pane_current_path}'
set-window-option -g allow-rename off
set -g allow-passthrough on

# Status bar at top
set -g status-position top

# =============================================================================
# Remove all default bindings (clear-defaults=true)
# =============================================================================
unbind-key -a

set -g prefix C-b
bind C-b send-prefix

# =============================================================================
# Keybindings — Alt-based, no prefix
# =============================================================================

# --- Pane navigation ---
bind -n M-h if-shell -F '#{pane_at_left}'  'previous-window' 'select-pane -L'
bind -n M-l if-shell -F '#{pane_at_right}' 'next-window'     'select-pane -R'
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# --- Pane management ---
bind -n M-n split-window -h -c "#{pane_current_path}"  # NewPane
bind -n M-x kill-pane                                   # CloseFocus
bind -n M-b break-pane                                  # BreakPane → new window
bind -n M-p display-popup -E -e TMUX_POPUP=1 -d '#{pane_current_path}' -w 90% -h 90% 'lazygit'

# --- Tab (window) management ---
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-q kill-window

# --- Resize ---
bind -n M-= resize-pane -R 5
bind -n M-- resize-pane -L 5

# --- Scrollback ---
bind -n M-c clear-history \; send-keys "clear" Enter
bind -n M-r copy-mode

# --- Session ---
bind -n M-d detach-client
bind -n M-s run-shell "~/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"

# --- Copy mode vi bindings (tmux-yank handles y + clipboard) ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# =============================================================================
# Sessionx
# =============================================================================
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '55%'
set -g @sessionx-window-width '65%'
set -g @sessionx-preview-enabled 'true'

# =============================================================================
# Catppuccin Mocha theme
# =============================================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_fill 'number'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text ' #W'

set -g @catppuccin_date_time_text ' %H:%M %Y-%m-%d'
set -g window-status-separator " "

set -g status-left-length 40
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_date_time}'

set -g pane-border-style        'fg=#{@thm_surface1}'
set -g pane-active-border-style 'fg=#{@thm_blue}'

set -g message-style         'bg=#{@thm_surface1},fg=#{@thm_text}'
set -g message-command-style 'bg=#{@thm_surface1},fg=#{@thm_text}'

# =============================================================================
# TPM — must be last line
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
